name: Sentinel SAST Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  sast-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang libclang-dev
        python -m pip install --upgrade pip
        pip install clang
        # If your app has other requirements
        pip install -r requirements.txt || true

    - name: Run SAST Scanner
      run: |
        # Scan the tests directory or specific files
        # It will fail the build (exit 1) if any High or Medium vulnerabilities are found
        python cli/sast-cli.py tests/vulnerable_sample.c --format table --fail-on medium
